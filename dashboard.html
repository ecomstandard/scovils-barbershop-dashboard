<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Barbershop Live Dashboard</title>

<style>
  :root {
    --bg: #0b0b0b;
    --card-bg: #151515;
    --accent: #c9a84c;
    --accent-soft: rgba(201,168,76,0.18);
    --text-main: #f5f5f5;
    --text-muted: #9a9590;
    --success: #3fbf6b;
  }

  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #1f1a12 0, #050505 55%);
    font-family: system-ui, sans-serif;
    color: var(--text-main);
    overflow: hidden;
  }

  .dashboard-root {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 16px 24px;
    box-sizing: border-box;
  }

  .dash-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .dash-title {
    font-size: 1.4rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .dash-subtitle {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.16em;
  }

  .dash-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: right;
  }

  .barber-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
    overflow: hidden;
  }

  .barber-card {
    background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(0,0,0,0.9));
    border-radius: 14px;
    border: 1px solid rgba(201,168,76,0.35);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
  }

  .barber-header {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }

  .barber-avatar {
    width: 42px;
    height: 42px;
    border-radius: 999px;
    background: radial-gradient(circle at 30% 20%, #ffffff, #555);
    border: 2px solid var(--accent);
    margin-right: 10px;
  }

  .barber-name {
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
  }

  .barber-status-pill {
    display: inline-block;
    margin-top: 2px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    background: var(--accent-soft);
    color: var(--accent);
  }

  .barber-status-pill.available {
    background: rgba(63,191,107,0.16);
    color: var(--success);
  }

  .current-block {
    background: rgba(0,0,0,0.7);
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 6px;
  }

  .current-title {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .current-main {
    display: flex;
    justify-content: space-between;
  }

  .current-service {
    font-size: 0.9rem;
    font-weight: 600;
  }

  .current-time {
    font-size: 0.8rem;
    color: var(--accent);
  }

  .upcoming-list {
    flex: 1;
    overflow-y: auto;
    margin-top: 4px;
  }

  .appt-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 6px;
    background: rgba(255,255,255,0.02);
    border-radius: 6px;
    margin-bottom: 2px;
  }

  .appt-time {
    font-size: 0.8rem;
    color: var(--accent);
    margin-right: 6px;
  }

  .appt-service {
    font-size: 0.8rem;
  }

  .appt-client {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .empty-state {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-align: center;
    padding: 10px;
  }
</style>
</head>

<body>
<div class="dashboard-root">
  <div class="dash-header">
    <div>
      <div class="dash-title">Barbershop Live Board</div>
      <div class="dash-subtitle">Today + Tomorrow</div>
    </div>
    <div class="dash-meta">
      <span id="last-updated">Last update: —</span>
    </div>
  </div>

  <div id="barber-grid" class="barber-grid"></div>
</div>

<script type="text/javascript">
//<![CDATA[

const API_URL = "https://script.google.com/macros/s/AKfycbxIWQtjHZ7fJAE7v7VNvroIIkLBfaCq5m6X5R365zw0a9U4dxwiqCG8lwRRJzxJumJd/exec";
const REFRESH_MS = 30000;

function parseDT(dateStr, timeStr) {
  try {
    const [m, d, y] = dateStr.split("/");
    let [t, ampm] = timeStr.split(" ");
    let [h, min] = t.split(":").map(Number);
    if (ampm.toLowerCase() === "pm" && h < 12) h += 12;
    if (ampm.toLowerCase() === "am" && h === 12) h = 0;
    return new Date(y, m - 1, d, h, min);
  } catch {
    return null;
  }
}

async function loadData() {
  const res = await fetch(API_URL + "?mode=bookings", { cache: "no-store" });
  return res.json();
}

function render(rows) {
  const grid = document.getElementById("barber-grid");
  grid.innerHTML = "";

  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(now.getDate() + 1);

  const filtered = rows.filter(r => {
    const dt = parseDT(r["Date"], r["Time"]);
    if (!dt) return false;
    return dt.toDateString() === now.toDateString() ||
           dt.toDateString() === tomorrow.toDateString();
  });

  const groups = {};
  filtered.forEach(r => {
    const b = r["Barber"] || "Unassigned";
    if (!groups[b]) groups[b] = [];
    groups[b].push(r);
  });

  Object.keys(groups).sort().forEach(barber => {
    const appts = groups[barber]
      .map(r => ({ raw: r, dt: parseDT(r["Date"], r["Time"]) }))
      .sort((a,b) => a.dt - b.dt);

    const card = document.createElement("div");
    card.className = "barber-card";

    const header = document.createElement("div");
    header.className = "barber-header";

    const avatar = document.createElement("div");
    avatar.className = "barber-avatar";

    const name = document.createElement("div");
    name.className = "barber-name";
    name.textContent = barber;

    const status = document.createElement("div");
    status.className = "barber-status-pill";

    const nowDT = new Date();
    const upcoming = appts.filter(a => a.dt >= nowDT);
    const current = appts.find(a => {
      const start = a.dt;
      const end = new Date(start.getTime() + (Number(a.raw["Duration (min)"]) || 30) * 60000);
      return nowDT >= start && nowDT < end;
    });

    if (current) {
      status.textContent = "In Chair";
    } else if (upcoming.length > 0) {
      status.textContent = "Next: " + upcoming[0].raw["Time"];
    } else {
      status.textContent = "Available";
      status.classList.add("available");
    }

    header.appendChild(avatar);
    header.appendChild(name);
    header.appendChild(status);
    card.appendChild(header);

    const block = document.createElement("div");
    block.className = "current-block";

    const title = document.createElement("div");
    title.className = "current-title";
    title.textContent = current ? "Currently Cutting" : "Next Appointment";

    const main = document.createElement("div");
    main.className = "current-main";

    const svc = document.createElement("div");
    svc.className = "current-service";

    const t = document.createElement("div");
    t.className = "current-time";

    if (current) {
      svc.textContent = current.raw["Service"];
      t.textContent = current.raw["Time"];
    } else if (upcoming.length > 0) {
      svc.textContent = upcoming[0].raw["Service"];
      t.textContent = upcoming[0].raw["Time"];
    } else {
      svc.textContent = "No more bookings";
      t.textContent = "";
    }

    main.appendChild(svc);
    main.appendChild(t);
    block.appendChild(title);
    block.appendChild(main);
    card.appendChild(block);

    const list = document.createElement("div");
    list.className = "upcoming-list";

    upcoming.forEach(a => {
      const row = document.createElement("div");
      row.className = "appt-row";

      const time = document.createElement("div");
      time.className = "appt-time";
      time.textContent = a.raw["Time"];

      const svc2 = document.createElement("div");
      svc2.className = "appt-service";
      svc2.textContent = a.raw["Service"];

      const client = document.createElement("div");
      client.className = "appt-client";
      client.textContent = a.raw["Client Name"];

      row.appendChild(time);
      row.appendChild(svc2);
      row.appendChild(client);
      list.appendChild(row);
    });

    if (upcoming.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "No upcoming bookings.";
      list.appendChild(empty);
    }

    card.appendChild(list);
    grid.appendChild(card);
  });

  document.getElementById("last-updated").textContent =
    "Last update: " + new Date().toLocaleTimeString();
}

async function refresh() {
  try {
    const rows = await loadData();
    render(rows);
  } catch (e) {
    console.error(e);
  }
}

refresh();
setInterval(refresh, REFRESH_MS);

//]]>
</script>

</body>
</html>
